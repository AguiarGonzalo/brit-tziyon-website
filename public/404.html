<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>הדף לא נמצא | מוהל ציון שטרית</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rubik', sans-serif;
            background: #F9F7F2;
            color: #1A2F4B;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 560px;
        }

        .code {
            font-size: 7rem;
            font-weight: 700;
            color: #00B4D8;
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.15;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #1A2F4B;
        }

        p {
            font-size: 1.1rem;
            color: #4A5568;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: #00B4D8;
            margin: 1.2rem auto 2rem;
            border-radius: 2px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .btn-primary {
            display: inline-block;
            background: #00B4D8;
            color: #fff;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .btn-primary:hover {
            background: #0096C7;
        }

        .btn-secondary {
            display: inline-block;
            color: #00B4D8;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            border-bottom: 1px solid #00B4D8;
            padding-bottom: 2px;
            transition: opacity 0.2s ease;
        }

        .btn-secondary:hover {
            opacity: 0.7;
        }

        .phone {
            margin-top: 2.5rem;
            font-size: 0.95rem;
            color: #718096;
        }

        .phone a {
            color: #1A2F4B;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">✡️</span>
        <div class="code">404</div>
        <h1>הדף לא נמצא</h1>
        <div class="divider"></div>
        <p>נראה שהדף שחיפשת לא קיים.<br>אולי הקישור שגוי או שהדף הוסר.</p>

        <div class="links">
            <a href="/" class="btn-primary">חזרה לדף הבית</a>
            <a href="/#contact" class="btn-secondary">צרו קשר</a>
        </div>

        <p class="phone">
            צריכים עזרה? התקשרו ישירות:<br>
            <a href="tel:0505323909">050-5323909</a>
        </p>
    </div>
</body>
</html>
